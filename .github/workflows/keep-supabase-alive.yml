name: Keep Supabase Alive

on:
  schedule:
    # Jadwal ini akan berjalan setiap 3 hari sekali pada jam 00:00 UTC
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -f -X GET 'https://ecruhkvtequrxdrpjzrj.supabase.co/rest/v1/personnel?select=*&limit=1' \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
